<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Bodega - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex h-screen w-screen items-center justify-center font-sans">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 space-y-6 border border-slate-200">
        <div class="text-center">
            <div class="mx-auto h-12 w-12 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-md shadow-blue-200">
                SB
            </div>
            <h2 class="mt-4 text-2xl font-bold text-slate-800 tracking-tight">¡Bienvenido de nuevo!</h2>
            <p class="text-sm text-slate-500 mt-1">Por favor, ingresa tus credenciales de acceso</p>
        </div>

        <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl flex items-center space-x-2">
            <span>⚠️</span>
            <p th:text="${error}"></p>
        </div>
        <div th:if="${success}" class="bg-emerald-50 border border-emerald-200 text-emerald-600 text-sm px-4 py-3 rounded-xl flex items-center space-x-2">
            <span>✅</span>
            <p th:text="${success}"></p>
        </div>

        <form th:action="@{/login-view}" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Usuario</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all"
                       placeholder="ejemplo_usuario">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Contraseña</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all"
                       placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-slate-600 cursor-pointer">
                    <input type="checkbox" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 mr-2">
                    Recordarme
                </label>
                <a href="#" class="text-blue-600 hover:underline font-medium">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" 
                    class="w-full py-3 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-xl shadow-lg shadow-blue-200 hover:shadow-xl transition-all duration-200 transform active:scale-[0.98]">
                Iniciar Sesión
            </button>
        </form>

        <div class="text-center text-xs text-slate-400 border-t border-slate-100 pt-4">
            &copy; 2026 Sistema Bodega. Todos los derechos reservados.
        </div>
    </div>

</body>
</html>
